services:

  # ---------------------------------------------------------------------------
  # Development server — http://localhost:8080/<feed>?token=dev
  # Usage: docker compose -f docker/docker-compose.yml up server
  # ---------------------------------------------------------------------------
  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      FEED_TOKEN: dev
    volumes:
      - ..:/app
    command: php -S 0.0.0.0:8080 index.php

  # ---------------------------------------------------------------------------
  # Golden tests (no network)
  # Usage: docker compose -f docker/docker-compose.yml run --rm test-golden
  # ---------------------------------------------------------------------------
  test-golden:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    profiles:
      - golden
    volumes:
      - ..:/app
    command: phpunit --testsuite golden --group golden

  # ---------------------------------------------------------------------------
  # Live / sanity tests (needs internet)
  # Usage: docker compose -f docker/docker-compose.yml run --rm test-live
  # ---------------------------------------------------------------------------
  test-live:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    profiles:
      - live
    volumes:
      - ..:/app
    command: phpunit --testsuite live --group live
