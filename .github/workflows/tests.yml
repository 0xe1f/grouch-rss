name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:

  # ---------------------------------------------------------------------------
  # Golden tests: fixture-driven, no network required, always must pass.
  # ---------------------------------------------------------------------------
  golden:
    name: Golden tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: curl, json
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run golden tests
        run: vendor/bin/phpunit --testsuite golden --group golden

  # ---------------------------------------------------------------------------
  # Live tests: hit real websites, sanity-check results.
  # Network flakiness or site changes can cause failures; marked non-blocking.
  # ---------------------------------------------------------------------------
  live:
    name: Live sanity tests
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: curl, json
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run live tests
        run: vendor/bin/phpunit --testsuite live --group live
