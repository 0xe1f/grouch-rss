name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:

  # ---------------------------------------------------------------------------
  # Golden tests: fixture-driven, no network required, always must pass.
  # ---------------------------------------------------------------------------
  golden:
    name: Golden tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: curl, json
          coverage: none
          tools: none

      - name: Download PHPUnit
        run: |
          curl -sL https://phar.phpunit.de/phpunit-11.phar -o phpunit.phar
          chmod +x phpunit.phar

      - name: Run golden tests
        run: php phpunit.phar --testsuite golden --group golden

  # ---------------------------------------------------------------------------
  # Live tests: hit real websites, sanity-check results.
  # Network flakiness or site changes can cause failures; marked non-blocking.
  # ---------------------------------------------------------------------------
  live:
    name: Live sanity tests
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: curl, json
          coverage: none
          tools: none

      - name: Download PHPUnit
        run: |
          curl -sL https://phar.phpunit.de/phpunit-11.phar -o phpunit.phar
          chmod +x phpunit.phar

      - name: Run live tests
        run: php phpunit.phar --testsuite live --group live
